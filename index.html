<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Amna 🎉</title>

<style>
/* ---------------- GENERAL ---------------- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
/* ADD THESE CHANGES IN YOUR CSS */

/* Make everything smoother */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #161718, #0072ff);
    color: white;
    overflow-x: hidden;
    padding: 10px;
}

/* Fix typing overflow issue */
#typing {
    font-size: clamp(16px,2.5vw,24px);
    max-width: 95%;
    margin: 20px auto;
    border-right: 3px solid white;
    white-space: normal; /* FIX */
    overflow: hidden;
}

/* Improve main content spacing */
#mainContent {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 15px;
    min-height: 100vh;
}

/* Better gallery responsiveness */
.gallery {
    display: grid; /* CHANGE */
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    width: 100%;
    max-width: 900px;
}

.gallery img {
    width: 100%;
    height: 180px;
    border-radius: 15px;
    object-fit: cover;
}

/* Surprise image responsive */
#surpriseContent img {
    width: 80%;
    max-width: 300px;
}

/* Button responsive */
#startBtn, #surpriseBtn {
    width: auto;
    max-width: 90%;
}

/* Popup fix */
#imagePopup img {
    max-width: 95%;
    max-height: 80%;
}

/* MOBILE EXTRA FIX */
@media (max-width: 600px) {

    .title {
        font-size: 24px;
    }

    #startBtn {
        font-size: 16px;
        padding: 10px 20px;
    }

    .cake {
        font-size: 45px;
    }

    h1 {
        font-size: 22px;
    }

    #countdown {
        font-size: 16px;
    }

    .gallery img {
        height: 140px;
    }

    #typing {
        border-right: 2px solid white;
    }
}


/* ---------------- ANIMATIONS ---------------- */
@keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
@keyframes glow { from { text-shadow:0 0 10px #fff;} to { text-shadow:0 0 25px #00c6ff;} }
@keyframes pulse {0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
@keyframes bounce {50% {transform: translateY(-20px);} }
@keyframes zoomIn { from {transform: scale(0.5); opacity:0;} to {transform: scale(1); opacity:1;} }
@keyframes fall { to {transform: translateY(100vh);} }

/* ---------------- RESPONSIVE ---------------- */
@media (max-width: 600px) {
    #typing { font-size: 16px; border-right: 2px solid white; }
    #startBtn { font-size: 18px; padding: 12px 25px; }
    .cake { font-size: clamp(30px,15vw,50px); }
}

    padding: 15px 30px;

    border: none;
    border-radius: 40px;
    background: #ff4081;
    color: white;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

#surpriseBtn:hover {
    transform: scale(1.1);
    background: #ff1c6b;
} */
</style>
</head>

<body>

    <!-- Music -->
    <audio id="music" src="music.mp3"></audio>
    
    <!-- Start Screen -->
    <div id="startScreen">
        <h1 class="title">🎁 Click to Open Surprise 🎁</h1>
        <button id="startBtn" onclick="start()">Open</button>
    </div>
    
    <!-- Main Content -->
    <div id="mainContent">
        <div class="cake">🎂</div>
        <h2 id="countdown" style="margin-top:10px;"></h2>
        <h1>Happy Birthday Amna 💖</h1><br>
        <p style="font-size: clamp(16px,2.5vw,24px);
        max-width: 90%;
        margin: 20px auto;
        border-right: 3px solid white;
        white-space: nowrap;
        overflow: hidden;">“Another year, another adventure”</p>
        <p id="typing"></p>
    
        <!-- Gallery -->
        <div class="gallery">
            <img src="img/Blue Red Simple Happy Birthday Card (Square).jpg" onclick="openImage(this.src)">
            <img src="img/front.jpeg" onclick="openImage(this.src)">
            <img src="img/White & Black Simple Happy Birthday Card.jpg" onclick="openImage(this.src)">
            
        </div> 
        <button id="surpriseBtn" onclick="showSurprise()">Click for a Surprise 🎁</button>

<div id="surpriseContent" style="display:none; margin-top:20px;">
    <h2>💖 Surprise for You Amna 💖</h2>
    <p style="font-size:20px;">You are the best sister in the world 🌸✨</p>
    
    <!-- Image -->
    <img src="img/amna hidefaec.jpeg" style="width:250px; border-radius:15px; margin-top:10px;">
    
    <!-- Optional Video -->
    <!--
    <video width="300" controls style="margin-top:10px; border-radius:10px;">
        <source src="img/vid.mp4" type="video/mp4">
    </video>
    -->
</div>
       
    
        <!-- Video (Optional) -->
        <!--
        <video id="bdayVideo" controls>
            <source src="img/vid.mp4" type="video/mp4">
        </video>
        -->
    </div>
    
    <!-- Image Popup -->
    <div id="imagePopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:999; flex-direction:column;">
        <span id="closeBtn" onclick="closeImage()" style="position:absolute; top:20px; right:30px; font-size:36px; color:white; cursor:pointer;">✖</span>
        <img id="popupImg" src="" alt="Popup Image" style="max-width:90%; max-height:90%; border-radius:15px;">
    </div>
    
    <script>
    function start() {
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "flex";
        document.getElementById("music").play();
        typeText();
        createConfetti();
    }
    
    const text = "Dear Amna Meri Pyari Sister ❤️ Tum meri life ka sab se important hissa ho. Allah tumhein hamesha khush rakhe. I love you so much 💖";
    let i = 0;
    function typeText() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML = text.substring(0, i);

            i++;
            setTimeout(typeText,50);
        }
    }
    
    function createConfetti() {
        for(let i = 0; i < 100; i++) {
          const confetti = document.createElement('div');
          confetti.classList.add('confetti');
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.backgroundColor = ['red', 'yellow', 'blue', 'white'][Math.floor(Math.random() * 4)];
          confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
          confetti.style.top = '-10px';
          document.body.appendChild(confetti);
        }
    }
    
    function openImage(src){
        document.getElementById("imagePopup").style.display = "flex";
        document.getElementById("popupImg").src = src;
    }
    
    function closeImage(){
        document.getElementById("imagePopup").style.display = "none";
    }
    // Countdown Timer
const birthdayDate = new Date("MArch 28, 2026 00:00:00").getTime();

function updateCountdown() {
    const now = new Date().getTime();
    const gap = birthdayDate - now;

    const days = Math.floor(gap / (1000 * 60 * 60 * 24));
    const hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((gap % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        `🎉 ${days}d ${hours}h ${minutes}m ${seconds}s left`;

    if (gap < 0) {
        document.getElementById("countdown").innerHTML = "🎂 It's Birthday Time!";
    }
}

setInterval(updateCountdown, 1000);

function showSurprise() {
    document.getElementById("surpriseContent").style.display = "block";

    // BIG Confetti Blast 🎉
    for(let i = 0; i < 200; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = ["red","yellow","blue","pink","white"][Math.floor(Math.random()*5)];
        confetti.style.animationDuration = (Math.random() * 2 + 1) + "s";

        document.body.appendChild(confetti);

        setTimeout(()=> confetti.remove(),2000);
    }

    // Button hide after click
    document.getElementById("surpriseBtn").style.display = "none";
}
    </script>
    
    </body></html>
