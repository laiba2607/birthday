<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Amna 🎉</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #161718, #0072ff);
    color: white;
    overflow-x: hidden;
    padding: 10px;
}

/* START SCREEN */
#startScreen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    position: relative;
    z-index: 2;
}

.title {
    font-size: clamp(24px, 6vw, 42px);
    animation: float 3s ease-in-out infinite, glow 2s infinite alternate;
}

#startBtn {
    padding: clamp(12px,2vw,20px) clamp(25px,5vw,50px);
    font-size: clamp(18px,2.5vw,24px);
    border: none;
    border-radius: 50px;
    background: white;
    color: #0072ff;
    cursor: pointer;
    margin-top: 20px;
    animation: pulse 1.5s infinite;
}

/* MAIN CONTENT */
#mainContent {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px;
    min-height: 100vh;

    /* position: relative;
    z-index: 2; */
}
/* #mainContent, #startScreen {
    position: relative;
    z-index: 2;
} */
.cake {
    font-size: clamp(40px,10vw,70px);
    animation: bounce 2s infinite;
}

/* Typing FIX */
#typing {
    font-size: clamp(16px,2.5vw,24px);
    max-width: 95%;
    margin: 20px auto;
    border-right: 3px solid white;
    white-space: normal;
    overflow: hidden;
}

/* CONFETTI BACKGROUND */
 .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 3px;
    opacity: 0.8;
    animation: fall linear infinite;

    z-index: 0;
    pointer-events: none;
}

/* Gallery (Responsive Grid) */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 900px;
}

.gallery img {
    width: 100%;
    height: 180px;
    border-radius: 15px;
    object-fit: cover;
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Popup */
#imagePopup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}

#imagePopup img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 15px;
}

#closeBtn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}

/* Button */
#surpriseBtn {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 40px;
    background: #ff4081;
    color: white;
    cursor: pointer;
    margin-top: 20px;
}

/* Animations */
@keyframes float { 50% { transform: translateY(-15px); } }
@keyframes glow { from { text-shadow:0 0 10px #fff;} to { text-shadow:0 0 25px #00c6ff;} }
@keyframes pulse {50% {transform: scale(1.1);} }
@keyframes bounce {50% {transform: translateY(-20px);} }
@keyframes fall { to { transform: translateY(100vh);} }

/* MOBILE */
@media (max-width: 600px) {

    h1 {
        font-size: 22px;
    }

    #countdown {
        font-size: 16px;
    }

    .gallery img {
        height: 140px;
    }

    #surpriseBtn {
        width: 90%;
    }
}
</style>
</head>

<body>

<audio id="music" src="music.mp3"></audio>

<div id="startScreen">
    <h1 class="title">🎁 Click to Open Surprise 🎁</h1>
    <button id="startBtn" onclick="start()">Open</button>
</div>

<div id="mainContent">
    <div class="cake">🎂</div>
    <h2 id="countdown"></h2>
    <h1>Happy Birthday Amna 💖</h1>

    <p id="typing"></p>

    <div class="gallery">
        <img src="img/Blue Red Simple Happy Birthday Card (Square).jpg" onclick="openImage(this.src)">
        <img src="img/front.jpeg" onclick="openImage(this.src)">
        <img src="img/White & Black Simple Happy Birthday Card.jpg" onclick="openImage(this.src)">
    </div>

    <button id="surpriseBtn" onclick="showSurprise()">Click for a Surprise 🎁</button>

    <div id="surpriseContent" style="display:none;">
        <h2>💖 Surprise for You Amna 💖</h2>
        <p>You are the best sister in the world 🌸✨</p>
        <img src="img/amna hidefaec.jpeg" style="width:250px; border-radius:15px;">
    </div>
</div>

<div id="imagePopup">
    <span id="closeBtn" onclick="closeImage()">✖</span>
    <img id="popupImg">
</div>

<script>
function start() {
    startScreen.style.display = "none";
    mainContent.style.display = "flex";
    music.play();
    typeText();
    createConfetti();
}

const text = "Dear Amna Meri Pyari Sister ❤️ Tum meri life ka sab se important hissa ho. Allah tumhein hamesha khush rakhe 💖";
let i = 0;

function typeText() {
    if (i < text.length) {
        typing.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText,50);
    }
}

function createConfetti() {
    for(let i = 0; i < 100; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random()*100 + 'vw';
        c.style.background = ['red','yellow','blue','white'][Math.floor(Math.random()*4)];
        c.style.animationDuration = (Math.random()*3+2)+'s';
        document.body.appendChild(c);
    }
}

function openImage(src){
    imagePopup.style.display = "flex";
    popupImg.src = src;
}

function closeImage(){
    imagePopup.style.display = "none";
}

const birthdayDate = new Date("March 28, 2026").getTime();

setInterval(()=>{
    const gap = birthdayDate - Date.now();
    const d = Math.floor(gap/(1000*60*60*24));
    const h = Math.floor((gap/(1000*60*60))%24);
    const m = Math.floor((gap/(1000*60))%60);
    const s = Math.floor((gap/1000)%60);

    countdown.innerHTML = gap>0 ? `🎉 ${d}d ${h}h ${m}m ${s}s left` : "🎂 It's Birthday Time!";
},1000);

function showSurprise() {
    surpriseContent.style.display = "block";
    surpriseBtn.style.display = "none";
}
</script>

</body>
</html>
